<div class="w-full">
    <div class="rounded-xl border bg-card overflow-hidden">
        <table z-table>
            <thead z-table-header>
                <tr z-table-row>
                    <th z-table-head>Conta</th>
                    <th z-table-head class="w-px whitespace-nowrap text-right">Ações</th>
                </tr>
            </thead>
            <tbody z-table-body>
                @for (row of rows(); track row.id) {
                <tr z-table-row>
                    <td z-table-cell class="w-full tree-row" [style.--row-depth]="row.codeDepth">

                        <z-button zType="ghost" (click)="toggleCollapsed(row.id)"
                            class="p-0.5 rounded hover:bg-muted shrink-0" [ngClass]="hasChildren(row)?'':'invisible'">
                            @if (isCollepsed(row.id)){
                            <ng-icon name="lucideChevronDown" />
                            } @else{
                            <ng-icon name="lucideChevronRight" />
                            }
                        </z-button>
                        <app-account-title class="min-w-0 truncate" [account]="row"
                            [ngClass]="getWeigthClass(row.isSummary)" [appAccountTheme]="row.accountClass"
                            variant="text" [isContra]="row.isContra" />
                    </td>
                    <td z-table-cell>
                        @if(row.isActive){
                        <z-button zType="ghost" title="Inativar" [zDisabled]="canInactivate(row)" (click)="toggleActive.emit(row)">
                            <ng-icon name="lucideEye" />
                        </z-button>
                        }@else {
                        <z-button zType="ghost" title="Ativar" [zDisabled]="canActivate(row)" (click)="toggleActive.emit(row)">
                            <ng-icon name="lucideEyeOff" />
                        </z-button>}
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
