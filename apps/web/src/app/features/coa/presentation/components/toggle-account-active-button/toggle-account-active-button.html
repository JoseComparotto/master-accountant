@if(account().isActive && canInactivate()){
<z-button zType="ghost" title="Inativar" (click)="toggleActive()">
    <ng-icon name="lucideEye" />
</z-button>
}
@else if(!account().isActive && canActivate()) {
<z-button zType="ghost" title="Ativar" (click)="toggleActive()">
    <ng-icon name="lucideEyeOff" />
</z-button>
}
