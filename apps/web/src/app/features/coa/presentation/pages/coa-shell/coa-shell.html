<div class="h-screen bg-muted/30 flex flex-col overflow-hidden">
    <div class="max-w-7xl w-full mx-auto px-4 sm:px-6 py-6 sm:py-10 flex flex-col flex-1 min-h-0">
        <header app-coa-header class="shrink-0"></header>
        
        <main class="flex flex-col gap-3 flex-1 min-h-0 overflow-hidden">
            <div class="flex flex-wrap items-center justify-between gap-3 shrink-0">
                <hlm-tabs [tab]="currentTab()">
                    <hlm-tabs-list>
                        @for (tab of tabs; track tab.route) {
                        <a hlmTabsTrigger class="p-2" [routerLink]="tab.route" routerLinkActive #rla="routerLinkActive"
                            [attr.data-state]="rla.isActive ? 'active' : 'inactive'"
                            (isActiveChange)="onTabChange(tab.route, $event)">
                            <ng-icon [name]="tab.icon" />
                            {{ tab.label }}
                        </a>
                        }
                    </hlm-tabs-list>
                </hlm-tabs>
                <button hlmBtn variant="outline" title="Recarregar" (click)="facade.load()">
                    <ng-icon name="lucideRefreshCcw" />
                </button>
            </div>

            @if (facade.error(); as error) {
            <div class="alert-error shrink-0">⚠️ Erro: {{ error }}</div>
            }
            @else if (facade.loading()) {
            <div class="flex flex-1 items-center justify-center">
                <hlm-spinner icon="lucideLoader" />
            </div>
            }
            @else if(facade.chart(); as chart){
            <div class="flex-1 min-h-0 w-full">
                <router-outlet></router-outlet>
            </div>
            }

        </main>
        <footer app-coa-footer class="shrink-0 mt-auto pt-2"></footer>
    </div>
</div>
