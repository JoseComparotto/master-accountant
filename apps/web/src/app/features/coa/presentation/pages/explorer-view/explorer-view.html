<div class="flex flex-col gap-4">
    <div class="flex items-center justify-between">
        <nav hlmBreadcrumb>
            <ol hlmBreadcrumbList>
                <li hlmBreadcrumbItem>
                    <a [routerLink]="['/coa/explorer']" class="flex items-center gap-1">
                        <ng-icon name="lucideHome" />
                        <span>Plano de Contas</span>
                    </a>
                </li>
                @for(item of breadcrumbItems();track item.id.value){
                <li hlmBreadcrumbSeparator></li>
                <li hlmBreadcrumbItem>
                    <a [routerLink]="['/coa/explorer', item.id.value]">
                        <app-account-title [account]="item" />
                    </a>
                </li>
                }
            </ol>
        </nav>

        @if(account(); as currentAccount){
        <app-account-actions [account]="currentAccount" variant="expanded" [actions]="['createChild']" />
        }
    </div>
    @if(account(); as currentAccount){

    <div class="rounded-2xl border p-5" [appAccountClassTheme]="currentAccount.accountClass" variant="soft">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between sm:flex-wrap">
            <div class="min-w-0 flex-1">
                <h1>
                    <app-account-title [account]="currentAccount" class="text-2xl font-medium" />
                </h1>
                <p class="text-sm text-muted-foreground mt-2 max-w-prose">
                    {{currentAccount.description}}
                </p>
            </div>
            <app-account-actions [account]="currentAccount" variant="expanded" buttonVariant="outline"
                [actions]="['edit','toggleActive']" class="shrink-0 self-start gap-2" />
        </div>
    </div>
    }
</div>
