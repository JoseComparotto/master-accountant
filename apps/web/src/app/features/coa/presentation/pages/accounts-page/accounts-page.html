@if (facade.error(); as error) {
<div class="alert-error">⚠️ Erro: {{ error }}</div>
}

@else if (facade.loading()) {
<div class="flex h-screen items-center justify-center">
    <z-loader />
</div>
}

@else if(facade.chart();as chart){
<app-accounts-table [chart]="chart" (toggleActive)="toggleActive($event)" (createChild)="createChild($event)"
    (edit)="edit($event)" />
}
