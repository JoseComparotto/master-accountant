<div class="accounts-container">
    @if (facade.error(); as error) {
    <div class="alert-error">⚠️ Erro: {{ error }}</div>
    }
    
    @if (facade.loading()) {
    <p>Carregando...</p>
    }

    @else if(facade.chart();as chart){
    <app-accounts-table
        [chart]="facade.chart()!"
        (toggleActive)="toggleActive($event)"
        (createChild)="createChild($event)"
        (edit)="edit($event)"
    />
    }
</div>
